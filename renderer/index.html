<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; img-src 'self' https: data:; style-src 'self' 'unsafe-inline';" />
  <title>Chat Viewer</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">

    <!-- ── Sidebar ──────────────────────────────────────── -->
    <aside id="sidebar">
      <div id="sidebar-header">
        <span class="logo-icon">💬</span>
        <span class="logo-text">Chat Viewer</span>
      </div>

      <nav id="platform-nav">

        <!-- Twitch -->
        <div class="platform-section">
          <div class="platform-header">
            <div class="platform-title">
              <span class="platform-icon twitch-col">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M11.571 4.714h1.715v5.143H11.57zm4.715 0H18v5.143h-1.714zM6 0L1.714 4.286v15.428h5.143V24l4.286-4.286h3.428L22.286 12V0zm14.571 11.143l-3.428 3.428h-3.429l-3 3v-3H6.857V1.714h13.714z"/></svg>
              </span>
              <span>Twitch</span>
            </div>
            <button class="add-btn" data-platform="twitch" title="Add Twitch channel">+</button>
          </div>
          <div class="channel-list" id="twitch-channels"></div>
        </div>

        <!-- YouTube -->
        <div class="platform-section">
          <div class="platform-header">
            <div class="platform-title">
              <span class="platform-icon youtube-col">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M23.495 6.205a3.007 3.007 0 0 0-2.088-2.088c-1.87-.501-9.396-.501-9.396-.501s-7.507-.01-9.396.501A3.007 3.007 0 0 0 .527 6.205a31.247 31.247 0 0 0-.522 5.805 31.247 31.247 0 0 0 .522 5.783 3.007 3.007 0 0 0 2.088 2.088c1.868.502 9.396.502 9.396.502s7.506 0 9.396-.502a3.007 3.007 0 0 0 2.088-2.088 31.247 31.247 0 0 0 .5-5.783 31.247 31.247 0 0 0-.5-5.805zM9.609 15.601V8.408l6.264 3.602z"/></svg>
              </span>
              <span>YouTube</span>
            </div>
            <button class="add-btn" data-platform="youtube" title="Add YouTube channel">+</button>
          </div>
          <div class="channel-list" id="youtube-channels"></div>
        </div>

        <!-- TikTok -->
        <div class="platform-section">
          <div class="platform-header">
            <div class="platform-title">
              <span class="platform-icon tiktok-col">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V8.84a8.17 8.17 0 0 0 4.78 1.52V6.91a4.85 4.85 0 0 1-1.01-.22z"/></svg>
              </span>
              <span>TikTok</span>
            </div>
            <button class="add-btn" data-platform="tiktok" title="Add TikTok user">+</button>
          </div>
          <div class="channel-list" id="tiktok-channels"></div>
        </div>

        <!-- Kick -->
        <div class="platform-section">
          <div class="platform-header">
            <div class="platform-title">
              <span class="platform-icon kick-col">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M0 0h8v24H0zm8 8h4v3h4V8h4v8h-4v-3h-4v3H8z"/></svg>
              </span>
              <span>Kick</span>
            </div>
            <button class="add-btn" data-platform="kick" title="Add Kick channel">+</button>
          </div>
          <div class="channel-list" id="kick-channels"></div>
        </div>

      </nav>

      <!-- ── Settings panel ────────────────────── -->
      <div id="settings-panel">
        <button id="settings-toggle">
          <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><path d="M19.14 12.94c.04-.3.06-.61.06-.94s-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.49.49 0 0 0-.59-.22l-2.39.96a6.98 6.98 0 0 0-1.62-.94l-.36-2.54A.484.484 0 0 0 14 2h-4a.484.484 0 0 0-.48.41l-.36 2.54a7.357 7.357 0 0 0-1.62.94l-2.39-.96a.48.48 0 0 0-.59.22L2.64 8.47a.48.48 0 0 0 .12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.36 1.04.67 1.62.94l.36 2.54c.05.24.27.41.48.41h4c.24 0 .44-.17.47-.41l.36-2.54a7.357 7.357 0 0 0 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32a.48.48 0 0 0-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
          Settings
          <span id="settings-arrow">&#9650;</span>
        </button>
        <div id="settings-body">

          <div class="settings-section-label">Text-to-Speech</div>

          <div class="settings-row">
            <label class="settings-label" for="tts-toggle-chk">Enable TTS</label>
            <label class="toggle-switch">
              <input type="checkbox" id="tts-toggle-chk" />
              <span class="toggle-track"></span>
            </label>
          </div>

          <div class="settings-row">
            <label class="settings-label" for="tts-voice-sel">Voice</label>
            <select id="tts-voice-sel"></select>
          </div>

          <div class="settings-row">
            <label class="settings-label">Rate <span id="tts-rate-val">1.1x</span></label>
            <input type="range" id="tts-rate" min="0.5" max="2" step="0.1" value="1.1" />
          </div>

          <div class="settings-row">
            <label class="settings-label">Volume <span id="tts-vol-val">100%</span></label>
            <input type="range" id="tts-vol" min="0" max="1" step="0.05" value="1" />
          </div>

          <div class="settings-section-label" style="margin-top:10px">TTS Platforms</div>

          <div class="settings-row tts-platform-row">
            <label class="tts-plat-chk"><input type="checkbox" data-platform="twitch"  checked /> <span class="dot twitch-bg"></span> Twitch</label>
            <label class="tts-plat-chk"><input type="checkbox" data-platform="youtube" checked /> <span class="dot youtube-bg"></span> YouTube</label>
            <label class="tts-plat-chk"><input type="checkbox" data-platform="tiktok"  checked /> <span class="dot tiktok-bg"></span> TikTok</label>
            <label class="tts-plat-chk"><input type="checkbox" data-platform="kick"    checked /> <span class="dot kick-bg"></span> Kick</label>
          </div>

          <div class="settings-section-label" style="margin-top:10px">Chat Display</div>

          <div class="settings-row">
            <label class="settings-label">Font size <span id="font-size-val">14px</span></label>
            <input type="range" id="font-size-range" min="11" max="22" step="1" value="14" />
          </div>

          <div class="settings-row">
            <label class="settings-label" for="max-msgs-input">Max messages</label>
            <input type="number" id="max-msgs-input" min="50" max="5000" step="50" value="500" />
          </div>

        </div>
      </div>

      <div id="sidebar-footer">
        <span id="msg-count">0 messages</span>
      </div>
    </aside>

    <!-- ── Main ─────────────────────────────────────────── -->
    <main id="main">

      <div id="update-banner" class="hidden">
        <span id="update-banner-text">🔄 A new version has been downloaded and is ready to install.</span>
        <button id="update-install-btn">Restart &amp; Install</button>
        <button id="update-dismiss-btn" title="Dismiss">×</button>
      </div>

      <div id="filter-bar">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="twitch">
          <span class="dot twitch-bg"></span>Twitch
        </button>
        <button class="filter-btn" data-filter="youtube">
          <span class="dot youtube-bg"></span>YouTube
        </button>
        <button class="filter-btn" data-filter="tiktok">
          <span class="dot tiktok-bg"></span>TikTok
        </button>
        <button class="filter-btn" data-filter="kick">
          <span class="dot kick-bg"></span>Kick
        </button>
        <div id="filter-right">
          <label id="pause-label">
            <input type="checkbox" id="pause-chk" /> Pause
          </label>
          <button id="test-btn" title="Send a fake test message to verify rendering">Test Msg</button>
          <button id="clear-btn">Clear</button>
        </div>
      </div>

      <div id="chat-feed" role="log" aria-live="polite" aria-label="Chat messages"></div>

      <div id="viewers-bar">
        <span class="vb-item"><span class="dot twitch-bg"></span>Twitch <strong id="vb-twitch">—</strong></span>
        <span class="vb-sep"></span>
        <span class="vb-item"><span class="dot youtube-bg"></span>YouTube <strong id="vb-youtube">—</strong></span>
        <span class="vb-sep"></span>
        <span class="vb-item"><span class="dot tiktok-bg"></span>TikTok <strong id="vb-tiktok">—</strong></span>
        <span class="vb-sep"></span>
        <span class="vb-item"><span class="dot kick-bg"></span>Kick <strong id="vb-kick">—</strong></span>
        <span class="vb-sep vb-sep-total"></span>
        <span class="vb-item vb-total">Total <strong id="vb-total">—</strong></span>
      </div>

      <button id="scroll-btn" class="hidden">↓ New messages</button>
    </main>

  </div>

  <!-- ── Add-channel modal ─────────────────────────────── -->
  <div id="overlay" class="hidden" role="dialog" aria-modal="true">
    <div id="modal">
      <h3 id="modal-title">Add Channel</h3>
      <p id="modal-desc"></p>
      <input id="modal-input" type="text" autocomplete="off" spellcheck="false" />
      <p id="modal-err" role="alert"></p>
      <div id="modal-actions">
        <button id="modal-cancel">Cancel</button>
        <button id="modal-ok">Connect</button>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
